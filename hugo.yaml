baseURL: "https://raffaelececoro.com/"
title: "Raffaele Cecoro | BLOG"
theme: ["PaperMod"]
pagerSize: 10
enableRobotsTXT: true

languageCode: "it-IT"
defaultContentLanguage: "it"

languages:
  it:
    languageCode: "it-IT"
    languageName: "Italiano"
    weight: 1


minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Raffaele Cecoro | Blog"
  description: "Blog di Raffaele Cecoro, avvocato e giornalista: articoli su diritto, attualità, cultura, letteratura e arte. Nuovi post ogni settimana"
  keywords: ["politica", "giustizia", "filosofia", "diritto", "letteratura", "arte"]
  author: "Raffaele Cecoro"
  ShowAllPagesInArchive: true
  comments: false
  params:
  DateFormat: "02/01/2006"
  ShowWordCount: false  
  images:
    - "/images/og-default.png"
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  UseHugoToc: true

  # Home "demo style" (Home-Info mode)
  homeInfoParams:
  Title: "Raffaele Cecoro"
  Content: |
    <div style="text-align:center; padding:3rem 0;">
      <h1 style="font-size:3rem; font-weight:700; margin:0 0 0.5rem; line-height:1.1;">Raffaele Cecoro</h1>
      <p style="font-size:1.2rem; color:var(--secondary); margin:0 0 2rem;">Avvocato | Giornalista pubblicista | Docente</p>
      <p style="max-width:600px; margin:0 auto 2rem; font-size:1.1rem; opacity:0.9;">
        Riflessioni su diritto, cultura e società. Articoli chiari per orientarsi nel mondo complesso di oggi.
      </p>
    </div>

 
  # Social Icons
  socialIcons:
    - name: "mastodon"
      url: "https://mastodon.social/@cecoro"
    - name: "github"
      url: "https://github.com/raffaele-1990"
    - name: "linkedin"
      url: "https://it.linkedin.com/in/raffaele-cecoro-67645b42"
    - name: "facebook"
      url: "https://facebook.com/raffaelececoro"
    

menu:
  main:
    - identifier: chisono
      name: "👤 Chi sono"
      url: "/chi-sono/"
      weight: 10
    - identifier: pubblicazioni
      name: "📚 Pubblicazioni"
      url: "/pubblicazioni/"
      weight: 20
    - identifier: contatti
      name: "✉️ Contatti"
      url: "/contatti/"
      weight: 30
    - identifier: blog
      name: "📝 Blog"
      url: "/posts/"
      weight: 40

markup:
  highlight:
    noClasses: false
