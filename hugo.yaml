baseURL: "https://raffaelececoro.com/"
title: "Raffaele Cecoro | BLOG"
theme: ["PaperMod"]
pagerSize: 10
enableRobotsTXT: true

languageCode: "it-IT"
defaultContentLanguage: "it"

languages:
  it:
    languageCode: "it-IT"
    languageName: "Italiano"
    weight: 1

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Raffaele Cecoro | Blog"
  description: "Blog di Raffaele Cecoro, avvocato e giornalista: articoli su diritto, attualità, cultura, letteratura e arte. Nuovi post ogni settimana"
  keywords: ["politica", "giustizia", "filosofia", "diritto", "letteratura", "arte"]
  author: "Raffaele Cecoro"
  ShowAllPagesInArchive: true
  comments: false
  DateFormat: "02/01/2006"
  ShowWordCount: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  UseHugoToc: true
  images: ["/images/og-default.png"]
  defaultTheme: auto
  disableThemeToggle: false
  mainSections: ["posts"]  # ← AGGIUNTO: PostNavLinks su /posts
  
  # Home "demo style" (Home-Info mode)
  homeInfoParams:
    Title: "Raffaele Cecoro"
    Content: |
Avvocato, giornalista pubblicista e docente, considero ogni giorno un’opportunità di esplorazione: una continua scoperta di dettagli che sfuggono all’occhio distratto, lasciandomi affascinare dalla bellezza del particolare.   AlignSocialIconsTo: "left"  # ← AGGIUNTO: social centrati
  
  # Social Icons (funziona in homeInfo)
  socialIcons:
    - name: "mastodon"
      url: "https://mastodon.social/@cecoro"
    - name: "github"
      url: "https://github.com/raffaele-1990"
    - name: "linkedin"
      url: "https://it.linkedin.com/in/raffaele-cecoro-67645b42"
    - name: "facebook"
      url: "https://facebook.com/raffaelececoro"

menu:
  main:
    - identifier: chisono
      name: "👤 Chi sono"
      url: "/chi-sono/"
      weight: 10
    - identifier: pubblicazioni
      name: "📚 Pubblicazioni"
      url: "/pubblicazioni/"
      weight: 20
    - identifier: contatti
      name: "✉️ Contatti"
      url: "/contatti/"
      weight: 30
    - identifier: blog
      name: "📝 Blog"
      url: "/posts/"
      weight: 40

markup:
  goldmark:
    renderer:
      unsafe: true  # ← AGGIUNTO: embed video/iframe
  highlight:
    noClasses: false
