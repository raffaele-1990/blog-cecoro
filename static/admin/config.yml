backend:
  name: git-gateway
  branch: main

media_library:
  name: default

publish_mode: editorial_workflow

media_folder: "static/img/uploads"
public_folder: "/img/uploads"

site_url: "https://raffaelececoro.com"
display_url: "https://raffaelececoro.com"

collections:
  - name: "posts"
    label: "Articoli"
    folder: "content/posts"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", default: "{{now}}" }
      - { label: "Descrizione", name: "description", widget: "text", required: false }
      - { label: "Bozza", name: "draft", widget: "boolean", default: true }
      - { label: "Contenuto", name: "body", widget: "markdown" }

  - name: "pagine"
    label: "Pagine"
    editor:
      preview: false
    files:
      - label: "Chi sono"
        name: "chi-sono"
        file: "content/chi-sono/index.md"
        fields:
          - { label: "Titolo", name: "title", widget: "string" }
          - { label: "Descrizione", name: "description", widget: "text" }
          - { label: "Contenuto", name: "body", widget: "markdown" }

      - label: "Contatti"
        name: "contatti"
        file: "content/contatti/index.md"
        fields:
          - { label: "Titolo", name: "title", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Contenuto", name: "body", widget: "markdown" }