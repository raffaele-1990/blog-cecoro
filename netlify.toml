[build]
  command = "hugo --gc --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.155.2"
  HUGO_ENV = "production"

# ------------------------- Headers SEO/Security -----------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; frame-ancestors 'none'"

# ------------------------- Redirects SEO ------------------------------
# 1) www -> non-www
[[redirects]]
  from = "https://www.raffaelececoro.com/*"
  to = "https://raffaelececoro.com/:splat"
  status = 301
  force = true

# 2) netlify.app -> dominio principale
[[redirects]]
  from = "https://raffaelececoro.netlify.app/*"
  to = "https://raffaelececoro.com/:splat"
  status = 301
  force = true

# 3) /admin -> /admin/ (Decap CMS)
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
  force = true

# 4) HTTP -> HTTPS (forza SSL)
[[redirects]]
  from = "http://raffaelececoro.com/*"
  to = "https://raffaelececoro.com/:splat"
  status = 301
  force = true

# 5) /posts -> / (home principale)
[[redirects]]
  from = "/posts"
  to = "/"
  status = 301
  force = true
