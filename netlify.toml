# --- ADMIN (metti QUESTE PER PRIME) ---

[[headers]]
  for = "/admin/config.yml"
  [headers.values]
    Content-Type = "text/yaml"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
  force = true

[build]
  command = "hugo --gc --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.155.2"
  HUGO_ENV = "production"

# ------------------------- SECURITY HEADERS -------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; frame-ancestors 'none'"

# ------------------------- REDIRECTS SEO (ordine importante) -----------------
# HTTP → HTTPS
[[redirects]]
  from = "http://raffaelececoro.com/*"
  to = "https://raffaelececoro.com/:splat"
  status = 301
  force = true

# www → non-www
[[redirects]]
  from = "https://www.raffaelececoro.com/*"
  to = "https://raffaelececoro.com/:splat"
  status = 301
  force = true

# Netlify → dominio principale
[[redirects]]
  from = "https://raffaelececoro.netlify.app/*"
  to = "https://raffaelececoro.com/:splat"
  status = 301
  force = true

# /posts → / (home principale)
[[redirects]]
  from = "/posts"
  to = "/"
  status = 301
  force = true

# ------------------------- CACHE PERFORMANCE ------------------------------
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
