[build]
  command = "hugo --gc --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.155.2"
  HUGO_ENV = "production"

# ------------------------- 
# Canonical domain (SEO)
# ------------------------- 
# 1) www -> non-www
[[redirects]]
  from = "https://www.raffaelececoro.com/*"
  to = "https://raffaelececoro.com/:splat"
  status = 301
  force = true

# 2) netlify.app -> dominio principale
[[redirects]]
  from = "https://raffaelececoro.netlify.app/*"
  to = "https://raffaelececoro.com/:splat"
  status = 301
  force = true

# (opzionale) Forza /admin -> /admin/ (evita 404 se qualcuno digita senza slash)
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
  force = true
